<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryan Calculator</title>
    <link rel="stylesheet" href="index.css">
    <link rel="shortcut icon" href="pictures\calculator-3d-application-icon-png.ico" type="image/x-icon">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
  <header class="navbar">
             <nav class="navbar1">
                 <h1>Ryan Calculator</h1>
                   <ul>                
                        <li><a href="about-calculator.html"><i ></i>About Calculator</a></li>
                        <li><a href="contact-creator.html"> <i ></i></i>Contact Creator</a></li>
                    </ul>
                    </nav>
        </header>

 <div class="container">
    <div class="calculator">



      <div class="display">
      <input type="text" name=" display" id="display" disabled>
      </div>
      <div>
       <input type="button" value="7" onclick="display.value += '7' ">
       <input type="button" value="8" onclick="display.value += '8'">
        <input type="button" value="9" onclick="display.value += '9' ">
          <input type="button" value="/" onclick="display.value += '/' ">
                <input type="button" value="AC" onclick="display.value = '' " class="operator">
      </div>
      <div>      
        <input type="button" value="4" onclick="display.value += '4' ">
       <input type="button" value="5" onclick="display.value += '5' ">
        <input type="button" value="6" onclick="display.value += '6' ">
         <input type="button" value="*" onclick="display.value += '*' ">
        <input type="button" value="DE" onclick="display.value = display.value.slice(0, -1)" class="operator">
        
        

        </div>
        <div>
       <input type="button" value="1" onclick="display.value += '1' ">
       <input type="button" value="2" onclick="display.value += '2' ">
        <input type="button" value="3" onclick="display.value += '3' ">
         <input type="button" value="-" onclick="display.value += '-' ">
         <input type="button" value="." onclick="display.value += '.' " class="operator">
      
               
                
        </div>

          <input type="button" value="00" onclick="display.value += '00' ">
       <input type="button" value="0" onclick="display.value += '0' ">
           <input type="button" value="/" onclick="display.value += '/' ">
         <input type="button" value="+" onclick="display.value += '+' ">
         <input type="button" value="=" onclick="display.value = eval(display.value)" class="equal">
         </div>
       
        
       
      </div>
    
   </div>
  
 </div>
</body>
</html>
